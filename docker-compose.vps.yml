services:
  server:
    # Nome exato da imagem que exportamos
    image: docker-server:latest 
    restart: always
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET}"
    volumes:
      - paperclip-data:/paperclip
      # Montagem externa para corrigir o arquivo de entrada
      - ./docker-entrypoint.sh:/usr/local/bin/docker-entrypoint.sh
    networks:
      - automacao-er_rede_automacao

networks:
  automacao-er_rede_automacao:
    external: true

volumes:
  paperclip-data:
